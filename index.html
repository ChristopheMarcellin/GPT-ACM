<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Rapports</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
      background-color: #f8f9fa;
      color: #333;
    }
    h1 {
      color: #0056b3;
      margin-bottom: 10px;
    }
    .banner {
      width: 100%;
      height: 120px;
      background-color: #ddd;
      background-image: url("photo2.jpg"); /* Placeholder banderole */
      background-size: cover;
      background-position: center;
      border-radius: 8px;
      margin-bottom: 30px;
    }
    .reports {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
    }
    .report-card {
      background: #fff;
      border: 1px solid #ccc;
      border-radius: 8px;
      width: 250px;
      padding: 15px;
      box-shadow: 2px 2px 6px rgba(0,0,0,0.1);
      text-align: center;
    }
    .report-card img {
      width: 100%;
      height: 120px;
      object-fit: cover;
      border-radius: 4px;
      margin-bottom: 10px;
    }
    .report-card a {
      display: block;
      margin-top: 10px;
      text-decoration: none;
      color: #007bff;
      font-weight: bold;
    }
    .report-card a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="banner"></div>

  <h1>Table des matières – Rapports disponibles</h1>
  <div class="reports">
    <div class="report-card">
      <img src="photo1.jpg" alt="Rapport de production">
      <p>Rapport de production</p>
      <a href="rapport-production.html">Ouvrir</a>
    </div>

    <!-- Exemple d’autres rapports -->
    <div class="report-card">
      <img src="photo3.jpg" alt="Rapport Janvier">
      <p>Rapport Janvier</p>
      <a href="rapport-janvier.html">Ouvrir</a>
    </div>

    <div class="report-card">
      <img src="photo4.jpg" alt="Rapport Février">
      <p>Rapport Février</p>
      <a href="rapport-fevrier.html">Ouvrir</a>
    </div>
  </div>
</body>
</html>
